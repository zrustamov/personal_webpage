name: RAG Grading CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

jobs:

  build_test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    env:
      CI: "true"

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: 3.10

      - name: Install dependencies
        run: |
          pip install -r Grade_RAG/requirements.txt

      - name: Run grading (CI simulation)
        run: |
          python Grade_RAG/grader.py

      - name: Validate output
        run: |
          test -f Grade_RAG/graded_results.json

      - name: Upload CI artifact
        uses: actions/upload-artifact@v3
        with:
          name: ci-results
          path: Grade_RAG/graded_results.json


  build_deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Prepare release
        run: |
          mkdir release
          cp Grade_RAG/graded_results.json release/

      - name: Simulate deployment
        run: |
          echo "Deploying RAG grading system..."
          echo "Deployment successful!"

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: production-results
          path: release/
