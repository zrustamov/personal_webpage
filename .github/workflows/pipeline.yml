name: RAG Grading CI/CD Pipeline

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

jobs:
  Build_Test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r Grade_RAG/requirements.txt

      - name: Run grading
        working-directory: Grade_RAG
        run: python grader.py

      - name: Validate output
        run: test -f Grade_RAG/graded_results.json

      - name: Upload CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: ci-results
          path: Grade_RAG/graded_results.json

  Build_Deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare release
        run: |
          mkdir -p release
          cp Grade_RAG/graded_results.json release/

      - name: Simulate deployment
        run: |
          echo "Deploying RAG grading system..."
          echo "Deployment successful."

      - name: Upload CD artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-results
          path: release/
