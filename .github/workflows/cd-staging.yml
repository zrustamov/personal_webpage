name: CD — Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: cd-staging
  cancel-in-progress: false

permissions:
  id-token: write       # required for OIDC login to Azure
  contents: read

env:
  AZURE_LOCATION: westeurope
  ENVIRONMENT: staging

jobs:
  # --------------------------------------------------------------------------
  # 1. Provision / update infrastructure with Bicep
  # --------------------------------------------------------------------------
  infrastructure:
    name: Deploy infrastructure (Bicep)
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      resourceGroupName: ${{ steps.deploy.outputs.resourceGroupName }}
      staticWebAppName: ${{ steps.deploy.outputs.staticWebAppName }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: |
          az bicep build --file infrastructure/main.bicep
          az deployment sub validate \
            --location $AZURE_LOCATION \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/staging.bicepparam

      - name: What-if (preview changes)
        run: |
          az deployment sub what-if \
            --location $AZURE_LOCATION \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/staging.bicepparam

      - name: Deploy Bicep
        id: deploy
        run: |
          out=$(az deployment sub create \
            --name "stg-${GITHUB_RUN_ID}" \
            --location "$AZURE_LOCATION" \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/staging.bicepparam \
            --query properties.outputs -o json)
          echo "resourceGroupName=$(echo "$out" | jq -r .resourceGroupName.value)" >> "$GITHUB_OUTPUT"
          echo "staticWebAppName=$(echo "$out" | jq -r .staticWebAppName.value)" >> "$GITHUB_OUTPUT"

  # --------------------------------------------------------------------------
  # 2. Deploy site content to staging SWA
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to Azure SWA (staging)
    runs-on: ubuntu-latest
    needs: infrastructure
    environment:
      name: staging
      url: ${{ steps.swa.outputs.static_web_app_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        id: swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src
          output_location: ''
          skip_app_build: true
          deployment_environment: ''  # empty = production environment of THIS SWA (which is staging tenant)

  # --------------------------------------------------------------------------
  # 3. End-to-end tests against the live staging URL
  # --------------------------------------------------------------------------
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E suite against staging
        env:
          E2E_BASE_URL: ${{ secrets.STAGING_BASE_URL }}
          CI: 'true'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  # --------------------------------------------------------------------------
  # 4. Notify on failure (uses GitHub deployments status — surfaces in PRs)
  # --------------------------------------------------------------------------
  report:
    name: Report status
    runs-on: ubuntu-latest
    needs: [infrastructure, deploy, e2e]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "### Staging deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "- Infrastructure: ${{ needs.infrastructure.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy:         ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E:            ${{ needs.e2e.result }}" >> $GITHUB_STEP_SUMMARY
