name: CD — Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

concurrency:
  group: cd-staging
  cancel-in-progress: false

permissions:
  id-token: write       # required for OIDC login to Azure
  contents: read

env:
  AZURE_LOCATION: swedencentral
  ENVIRONMENT: staging

jobs:
  # --------------------------------------------------------------------------
  # 1. Provision / update infrastructure with Bicep
  # --------------------------------------------------------------------------
  infrastructure:
    name: Deploy infrastructure (Bicep)
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      resourceGroupName: ${{ steps.deploy.outputs.resourceGroupName }}
      storageAccountName: ${{ steps.deploy.outputs.storageAccountName }}
      staticWebsiteHost: ${{ steps.deploy.outputs.staticWebsiteHost }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: |
          az bicep build --file infrastructure/main.bicep
          az deployment sub validate \
            --location $AZURE_LOCATION \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/staging.bicepparam

      - name: What-if (preview changes)
        run: |
          az deployment sub what-if \
            --location $AZURE_LOCATION \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/staging.bicepparam

      - name: Deploy Bicep
        id: deploy
        run: |
          out=$(az deployment sub create \
            --name "stg-${GITHUB_RUN_ID}" \
            --location "$AZURE_LOCATION" \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/staging.bicepparam \
            --query properties.outputs -o json)
          echo "resourceGroupName=$(echo "$out" | jq -r .resourceGroupName.value)" >> "$GITHUB_OUTPUT"
          echo "storageAccountName=$(echo "$out" | jq -r .storageAccountName.value)" >> "$GITHUB_OUTPUT"
          echo "staticWebsiteHost=$(echo "$out" | jq -r .staticWebsiteHost.value)" >> "$GITHUB_OUTPUT"

      - name: Enable static website hosting (idempotent)
        run: |
          az storage blob service-properties update \
            --account-name "${{ steps.deploy.outputs.storageAccountName }}" \
            --static-website \
            --index-document index.html \
            --404-document index.html \
            --auth-mode login

  # --------------------------------------------------------------------------
  # 2. Deploy site content to staging Storage account ($web container)
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to Storage (staging)
    runs-on: ubuntu-latest
    needs: infrastructure
    environment:
      name: staging
      url: https://${{ needs.infrastructure.outputs.staticWebsiteHost }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sync src/ to $web container
        run: |
          az storage blob upload-batch \
            --account-name "${{ needs.infrastructure.outputs.storageAccountName }}" \
            --auth-mode login \
            --destination '$web' \
            --source ./src \
            --overwrite true

      - name: Set short cache for HTML, long for assets
        run: |
          az storage blob update \
            --account-name "${{ needs.infrastructure.outputs.storageAccountName }}" \
            --auth-mode login \
            --container-name '$web' \
            --name index.html \
            --content-cache 'public, max-age=300, must-revalidate' || true

  # --------------------------------------------------------------------------
  # 3. End-to-end tests against the live staging URL
  # --------------------------------------------------------------------------
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: [infrastructure, deploy]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Wait for site to be reachable
        run: npx wait-on https://${{ needs.infrastructure.outputs.staticWebsiteHost }}/index.html --timeout 120000

      - name: Run E2E suite against staging
        env:
          E2E_BASE_URL: https://${{ needs.infrastructure.outputs.staticWebsiteHost }}
          CI: 'true'
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging-${{ github.run_id }}
          path: playwright-report/
          retention-days: 14

  # --------------------------------------------------------------------------
  # 4. Summary
  # --------------------------------------------------------------------------
  report:
    name: Report status
    runs-on: ubuntu-latest
    needs: [infrastructure, deploy, e2e]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "### Staging deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "- Infrastructure: ${{ needs.infrastructure.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy:         ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- E2E:            ${{ needs.e2e.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL:            https://${{ needs.infrastructure.outputs.staticWebsiteHost }}" >> $GITHUB_STEP_SUMMARY
