name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # --------------------------------------------------------------------------
  # 1. Lint — HTML / CSS / JS
  # --------------------------------------------------------------------------
  lint:
    name: Lint (HTML, CSS, JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint HTML (htmlhint)
        run: npm run lint:html

      - name: Lint CSS (stylelint)
        run: npm run lint:css

      - name: Lint JS (eslint)
        run: npm run lint:js

  # --------------------------------------------------------------------------
  # 2. Security — secret scan, dependency audit, filesystem CVE scan
  # --------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: npm audit (high/critical only)
        run: npm audit --audit-level=high

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # --------------------------------------------------------------------------
  # 3. Accessibility (Pa11y)
  # --------------------------------------------------------------------------
  accessibility:
    name: Accessibility (Pa11y)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Start static server
        run: |
          npm run serve &
          npx wait-on http://localhost:8080/index.html --timeout 30000

      - run: npm run test:a11y

  # --------------------------------------------------------------------------
  # 4. Lighthouse CI — performance, a11y score, SEO, best practices
  # --------------------------------------------------------------------------
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run test:lighthouse

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.run_id }}
          path: .lighthouseci/
          retention-days: 14

  # --------------------------------------------------------------------------
  # 5. PR preview environment — Azure SWA spins up an isolated URL per PR.
  #    Triggered only on pull_request events targeting develop.
  # --------------------------------------------------------------------------
  preview:
    name: Deploy PR preview
    runs-on: ubuntu-latest
    needs: [lint, security, accessibility, lighthouse]
    if: github.event_name == 'pull_request' && github.base_ref == 'develop'
    environment:
      name: preview
      url: ${{ steps.deploy.outputs.static_web_app_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Deploy to Azure SWA preview
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAGING }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: src
          output_location: ''
          skip_app_build: true
