name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  # --------------------------------------------------------------------------
  # 1. Lint — HTML / CSS / JS
  # --------------------------------------------------------------------------
  lint:
    name: Lint (HTML, CSS, JS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Lint HTML (htmlhint)
        run: npm run lint:html

      - name: Lint CSS (stylelint)
        run: npm run lint:css

      - name: Lint JS (eslint)
        run: npm run lint:js

  # --------------------------------------------------------------------------
  # 2. Bicep validation — make sure IaC compiles before merging
  # --------------------------------------------------------------------------
  bicep:
    name: Validate Bicep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bicep
        run: az bicep install

      - name: Build (lint) all Bicep files
        run: |
          az bicep build --file infrastructure/main.bicep
          az bicep build --file infrastructure/modules/workload.bicep

  # --------------------------------------------------------------------------
  # 3. Security — secret scan, dependency audit, filesystem CVE scan
  # --------------------------------------------------------------------------
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks (secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: npm audit (high/critical only)
        run: npm audit --audit-level=high

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-results.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # --------------------------------------------------------------------------
  # 4. Accessibility (Pa11y)
  # --------------------------------------------------------------------------
  accessibility:
    name: Accessibility (Pa11y)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Start static server
        run: |
          npm run serve &
          npx wait-on http://localhost:8080/index.html --timeout 30000

      - run: npm run test:a11y

  # --------------------------------------------------------------------------
  # 5. Lighthouse CI — performance, a11y score, SEO, best practices
  # --------------------------------------------------------------------------
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run test:lighthouse

      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports-${{ github.run_id }}
          path: .lighthouseci/
          retention-days: 14
