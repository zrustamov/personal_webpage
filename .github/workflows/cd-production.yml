name: CD — Production

# Production deploy fires only on push to main (typically a release PR
# merged from develop). The `production-approval` GitHub Environment must
# be configured with required reviewers — that gate enforces the manual
# approval step before any other job in this workflow can begin.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  deployments: write

env:
  AZURE_LOCATION: swedencentral
  ENVIRONMENT: production

jobs:
  # --------------------------------------------------------------------------
  # 1. Manual approval gate — implemented via the `production-approval`
  #    environment's "Required reviewers" rule. The workflow pauses here
  #    until a reviewer approves.
  # --------------------------------------------------------------------------
  approval:
    name: Await manual approval
    runs-on: ubuntu-latest
    environment:
      name: production-approval
    steps:
      - name: Approved
        run: echo "Manual approval granted by ${{ github.actor }}"

  # --------------------------------------------------------------------------
  # 2. Provision / update production infrastructure
  # --------------------------------------------------------------------------
  infrastructure:
    name: Deploy infrastructure (Bicep)
    runs-on: ubuntu-latest
    needs: approval
    environment: production
    outputs:
      resourceGroupName: ${{ steps.deploy.outputs.resourceGroupName }}
      storageAccountName: ${{ steps.deploy.outputs.storageAccountName }}
      staticWebsiteHost: ${{ steps.deploy.outputs.staticWebsiteHost }}
      appInsightsName: ${{ steps.deploy.outputs.appInsightsName }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Validate Bicep
        run: |
          az bicep build --file infrastructure/main.bicep
          az deployment sub validate \
            --location $AZURE_LOCATION \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/production.bicepparam

      - name: What-if (preview changes)
        run: |
          az deployment sub what-if \
            --location $AZURE_LOCATION \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/production.bicepparam

      - name: Deploy Bicep
        id: deploy
        run: |
          out=$(az deployment sub create \
            --name "prd-${GITHUB_RUN_ID}" \
            --location "$AZURE_LOCATION" \
            --template-file infrastructure/main.bicep \
            --parameters infrastructure/parameters/production.bicepparam \
            --query properties.outputs -o json)
          echo "resourceGroupName=$(echo "$out" | jq -r .resourceGroupName.value)" >> "$GITHUB_OUTPUT"
          echo "storageAccountName=$(echo "$out" | jq -r .storageAccountName.value)" >> "$GITHUB_OUTPUT"
          echo "staticWebsiteHost=$(echo "$out" | jq -r .staticWebsiteHost.value)" >> "$GITHUB_OUTPUT"
          echo "appInsightsName=$(echo "$out" | jq -r .appInsightsName.value)" >> "$GITHUB_OUTPUT"

      - name: Enable static website hosting (idempotent)
        run: |
          az storage blob service-properties update \
            --account-name "${{ steps.deploy.outputs.storageAccountName }}" \
            --static-website \
            --index-document index.html \
            --404-document index.html \
            --auth-mode login

  # --------------------------------------------------------------------------
  # 3. Deploy site content to production Storage account
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to Storage (production)
    runs-on: ubuntu-latest
    needs: infrastructure
    environment:
      name: production
      url: https://${{ needs.infrastructure.outputs.staticWebsiteHost }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Sync src/ to $web container
        run: |
          az storage blob upload-batch \
            --account-name "${{ needs.infrastructure.outputs.storageAccountName }}" \
            --auth-mode login \
            --destination '$web' \
            --source ./src \
            --overwrite true

  # --------------------------------------------------------------------------
  # 4. Post-deploy smoke tests against the live production URL
  # --------------------------------------------------------------------------
  smoke:
    name: Production smoke tests
    runs-on: ubuntu-latest
    needs: [infrastructure, deploy]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for site to be reachable
        run: npx wait-on https://${{ needs.infrastructure.outputs.staticWebsiteHost }}/index.html --timeout 120000

      - name: Smoke tests
        env:
          E2E_BASE_URL: https://${{ needs.infrastructure.outputs.staticWebsiteHost }}
          CI: 'true'
        run: npm run test:smoke

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-production-${{ github.run_id }}
          path: playwright-report/
          retention-days: 30

  # --------------------------------------------------------------------------
  # 5. Health check
  #    (a) HTTP probe — confirms the live URL serves 200 on every key page.
  #        This is the gate that blocks the workflow.
  #    (b) Log Analytics query — best-effort. Storage diagnostic logs flow
  #        into LA via Bicep diagnostic settings, but for a fresh deploy
  #        there's no traffic in the window, so we treat it as informational.
  # --------------------------------------------------------------------------
  health:
    name: Post-deploy health check
    runs-on: ubuntu-latest
    needs: [infrastructure, smoke]
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: HTTP probe (blocking)
        run: |
          base="https://${{ needs.infrastructure.outputs.staticWebsiteHost }}"
          fails=0
          for path in / /index.html /pages/cv.html /pages/contact.html; do
            for attempt in 1 2 3; do
              status=$(curl -s -o /dev/null -w "%{http_code}" "${base}${path}")
              if [ "$status" = "200" ]; then
                echo "OK   ${base}${path} → $status"
                break
              fi
              echo "WARN ${base}${path} → $status (attempt $attempt)"
              sleep 5
              if [ "$attempt" = "3" ]; then
                fails=$((fails + 1))
              fi
            done
          done
          if [ "$fails" -gt 0 ]; then
            echo "::error::$fails endpoint(s) failed the HTTP probe"
            exit 1
          fi

      - name: Wait for storage telemetry to reach Log Analytics
        run: sleep 60

      - name: Log Analytics error-rate query (best effort)
        continue-on-error: true
        run: |
          set +e
          QUERY='StorageBlobLogs | where TimeGenerated > ago(5m) | summarize total=count(), errors=countif(StatusCode >= 400)'
          ws_id=$(az monitor log-analytics workspace show \
            --resource-group "${{ needs.infrastructure.outputs.resourceGroupName }}" \
            --workspace-name "log-zrweb-production" \
            --query customerId -o tsv 2>&1)
          if [ -z "$ws_id" ] || [[ "$ws_id" == *ERROR* ]]; then
            echo "::warning::Could not look up Log Analytics workspace; skipping LA check"
            exit 0
          fi
          result=$(az monitor log-analytics query --workspace "$ws_id" --analytics-query "$QUERY" -o json 2>&1)
          if [ $? -ne 0 ]; then
            echo "::warning::LA query failed (likely no diagnostic data yet for fresh deploy)"
            echo "$result"
            exit 0
          fi
          echo "$result"
          total=$(echo "$result" | jq -r '.[0].total // 0' 2>/dev/null)
          errors=$(echo "$result" | jq -r '.[0].errors // 0' 2>/dev/null)
          echo "Total: ${total:-0} | Errors: ${errors:-0}"
          if [ -z "$total" ] || [ "$total" = "0" ] || [ "$total" = "null" ]; then
            echo "::notice::No traffic in 5-min window — nothing to evaluate (expected on first deploy)"
            exit 0
          fi
          if [ "${errors:-0}" -gt 0 ]; then
            awk -v e="$errors" -v t="$total" 'BEGIN { printf "Error rate: %.2f%%\n", (e/t)*100 }'
          fi

  # --------------------------------------------------------------------------
  # 6. Tag the release commit on success
  # --------------------------------------------------------------------------
  tag:
    name: Tag release
    runs-on: ubuntu-latest
    needs: health
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create release tag
        run: |
          tag="release-$(date -u +%Y%m%d-%H%M%S)"
          git tag "$tag"
          git push origin "$tag"
